$kind: http-request
url: "{{baseUrl}}/api/v1/auth/reset-password/:token"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  token: string
body:
  type: json
  content: |-
    {
      "new_password": "stringstring",
      "confirm_password": "stringstring"
    }
examples: ./.resources/Reset Password.resources/examples
order: 1000
