$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/reset-password/:token"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    token: string
  body:
    type: json
    content: |-
      {
        "new_password": "stringstring",
        "confirm_password": "stringstring"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: ""
order: 1000
